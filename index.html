<!DOCTYPE HTML>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Доска позора</title>
    <link rel="icon" href="assets/favicon.ico"/>
  </head>
  <style>
    body {
      background-color: #08080f;
      font-family: 'Inter', -apple-system, sans-serif;
      color: white;
      width: 95%;
      margin: 0 auto;
      display: block;
    }

    img {
      width: 50px;
      height: 50px;
    }

    h1{
      text-align: center;
    }

    .tagline{
      text-align: center;
    }

    a{
      text-decoration: none;
      color: white;
    }

    #board{
      max-width: 720px;
      margin: 0 auto;
      padding: 0;
    }

    .btn {
      margin-right: 5px;
    }

    .header-actions{
      text-align: center;
    }

    .counter{
      margin-top: 15px;
      font-size: 14pt;
      text-align: center;
      padding: 16px 20px;
    }

    .search-wrap{
      text-align: center;
      margin-bottom: 32px;
      margin-left: auto;
      margin-right: auto;
      padding: 0;
    }

    #search{
      padding: 14px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background-color: #0f0f1c;
      color: white;
    }

    .logo{
      display: block;
      margin-top: 15px;
      text-align: center;
    }

    .entry{
      background-color: #0f0f1c;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      margin-bottom: 18px;
      padding: 15px;
      line-height: 1.55;
    }

    .entry-avatar{
      border-radius: 50%;
    }

    .entry-desc{
      padding-top: 5px;
      padding-bottom: 5px;
      font-style: italic;
    }

    .entry-quote{
      padding: 15px;
      border-radius: 12px;
      background-color: #181833;
    }

    .entry-evidence{
      display: inline;
      margin-right: 0;
    }

    .quote-msg{
      padding: 5px 0;
    }

    .quote-msg-author{
      display: block;
      margin-bottom: 2px;
      font-weight: bold; 
    }

    .empty{
      text-align: center;
    }

    footer{
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .footer-sub{
      font-size: 10pt;
      margin-top: 1px;
    }
  </style>
  <body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header>
      <div class="logo"><img src="assets/favicon.ico"></div>
      <h1>Доска позора</h1>
      <p class="tagline">Лучшие высказывания чата, увековеченные навсегда</p>
      <div class="header-actions">
        <a
          href="https://github.com/WatLon/prod-shame-board/issues/new?template=shame.yml"
          target="_blank"
          class="btn btn-accent"
          >Номинировать</a
        >
        <a
          href="https://github.com/Basster284/prod-shame-board-png"
          target="_blank"
          class="btn btn-ghost"
        >
          GitHub
        </a>

        <a
          href="https://github.com/WatLon/prod-shame-board"
          target="_blank"
          class="btn btn-ghost"
        >
          GitHub (оригинал)
        </a>
      </div>
    </header>

    <div class="counter" id="counter"></div>

    <div class="search-wrap">
      <input
        type="text"
        id="search"
        placeholder="Поиск по цитатам и людям..."
        autocomplete="off"
      />
    </div>

    <div id="board"></div>

    <footer>
      <p>Сделано с участниками чата</p>
      <p class="footer-sub">Автор идеи - Данила Митяшин</p>
      <p class="footer-sub">PNG версия - basster284</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
