<!DOCTYPE HTML>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Доска позора</title>
    <link rel="icon" href="assets/favicon.ico"/>
  </head>
  <style>
    body {
      background-color: rgb(37, 37, 37);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      width: 95%;
      margin: 0 auto;
      display: block;
    }

    img {
      width: 50px;
      height: 50px;
    }

    a{
      color: white;
    }

    .btn {
      margin-right: 5px;
    }

    .logo{
      margin-top: 15px;
    }

    .entry{
      padding: 15px;
    }

    .entry-desc{
      padding-top: 5px;
      padding-bottom: 5px;
      font-style: italic;
    }

    .entry-quote{
      padding: 15px;
      background-color: #6e6e6e;
    }

    .quote-msg-author{
      display: block;
      font-weight: bold; 
    }

    .empty{
      text-align: center;
    }
  </style>
  <body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header>
      <div class="logo"><img src="assets/favicon.ico"></div>
      <h1>Доска позора</h1>
      <p class="tagline">Лучшие высказывания чата, увековеченные навсегда</p>
      <div class="header-actions">
        <a
          href="https://github.com/WatLon/prod-shame-board/issues/new?template=shame.yml"
          target="_blank"
          class="btn btn-accent"
          >Номинировать</a
        >
        <a
          href="https://github.com/Basster284/prod-shame-board-png"
          target="_blank"
          class="btn btn-ghost"
        >
          GitHub
        </a>

        <a
          href="https://github.com/WatLon/prod-shame-board"
          target="_blank"
          class="btn btn-ghost"
        >
          GitHub (оригинал)
        </a>
      </div>
    </header>

    <div class="counter" id="counter"></div>

    <div class="search-wrap">
      <input
        type="text"
        id="search"
        placeholder="Поиск по цитатам и людям..."
        autocomplete="off"
      />
    </div>

    <div id="board"></div>

    <footer>
      <p>Сделано с участниками чата</p>
      <p class="footer-sub">Автор идеи - Данила Митяшин</p>
      <p class="footer-sub">PNG версия - basster284</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
